name: Feature Request
description: Suggest an improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem Statement
      description: What pain point does this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives Considered
    validations:
      required: false
